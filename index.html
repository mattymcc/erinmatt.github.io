<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Erin & Matthew</title>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
-webkit-text-size-adjust:100%;
}

body{
font-family:'Playfair Display', serif;
background:#f7f4f2;
color:#333;
overflow-x:hidden;
padding-bottom:env(safe-area-inset-bottom);
animation:fadePage 1.2s ease;
}

@keyframes fadePage{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* petals */

.petal{
position:fixed;
top:-50px;
border-radius:50%;
opacity:0.85;
animation:fall linear infinite;
pointer-events:none;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

/* page */

.page{
max-width:1100px;
margin:auto;
padding:40px 22px;
}

/* header */

.names{
font-family:'Great Vibes', cursive;
font-size:62px;
text-align:center;
color:#8c5c5c;
margin-bottom:8px;
}

.subtitle{
text-align:center;
letter-spacing:2px;
font-size:15px;
color:#777;
margin-bottom:6px;
}

.date{
text-align:center;
font-size:16px;
color:#888;
margin-bottom:28px;
}

/* invite */

.invite-card{
background:white;
border-radius:16px;
box-shadow:0 30px 70px rgba(0,0,0,0.18);
padding:14px;
margin-bottom:30px;
}

.invite-card img{
width:100%;
height:auto;
border-radius:12px;
display:block;
}

/* divider */

.divider{
text-align:center;
font-size:24px;
letter-spacing:14px;
color:#e3b4b4;
margin:32px 0;
}

/* rsvp */

.rsvp-title{
text-align:center;
font-size:26px;
margin-bottom:6px;
}

.rsvp-deadline{
text-align:center;
font-size:15px;
color:#a06a6a;
margin-bottom:22px;
}

/* iframe container */

.rsvp-container{

width:100%;
height:72vh;

border-radius:16px;

overflow:hidden;

background:white;

box-shadow:0 25px 60px rgba(0,0,0,0.15);

}

/* iPhone iframe fix */

.rsvp-container iframe{

width:100%;
height:100%;

border:none;

overflow:auto;

-webkit-overflow-scrolling:touch;

}

/* desktop */

@media(min-width:900px){

.page{
display:grid;
grid-template-columns:1fr 1fr;
gap:60px;
align-items:start;
}

.names{
font-size:70px;
}

.rsvp-container{
height:88vh;
}

}

</style>
</head>

<body>

<script>

/* floating petals */

const colors=["#FFC0CB","#FFD700","#ADFF2F","#87CEFA","#FF69B4","#FFA07A","#DA70D6","#98FB98","#FFB6C1"];

const petalCount=window.innerWidth<800?35:80;

for(let i=0;i<petalCount;i++){

const p=document.createElement("div");

p.className="petal";

p.style.left=Math.random()*100+"vw";

p.style.width=6+Math.random()*12+"px";

p.style.height=6+Math.random()*12+"px";

p.style.background=colors[Math.floor(Math.random()*colors.length)];

p.style.animationDuration=(6+Math.random()*8)+"s";

p.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(p);

}

</script>

<div class="page">

<div>

<div class="names">Erin & Matthew</div>

<div class="date">
May 22, 2026 • Pierrefonds
</div>

<div class="invite-card">
<img src="invite.jpg" alt="Wedding Invitation">
</div>

<div class="divider">✿ ✿ ✿</div>

</div>

<div>

<div class="rsvp-title">
Please RSVP
</div>

<div class="rsvp-deadline">
by April 10th at the latest
</div>

<div class="rsvp-container">

<iframe src="https://erin-and-matthew.anrsvp.com/?embed=true"></iframe>

</div>

</div>

</div>

</body>
</html>
