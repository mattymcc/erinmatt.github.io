<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Erin & Matthew</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#f6f2ef;
  font-family:'Playfair Display', serif;
  overflow-x:hidden;
}

/* petals */

.petal{
  position:fixed;
  top:-50px;
  border-radius:50%;
  opacity:0.8;
  animation:fall linear infinite;
  pointer-events:none;
  box-shadow:0 0 6px rgba(0,0,0,0.12);
}

@keyframes fall{
  to{
    transform:translateY(110vh) rotate(360deg);
  }
}

/* layout */

.container{
  display:flex;
  min-height:100vh;
  width:100%;
}

/* LEFT SIDE */

.left{
  width:50%;
  background:linear-gradient(135deg,#f8ece8,#ffffff);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:30px;
}

.title{
  font-family:'Great Vibes', cursive;
  font-size:64px;
  color:#8c5c5c;
  margin-bottom:10px;
  text-align:center;
}

.subtitle{
  font-size:18px;
  color:#666;
  margin-bottom:20px;
  letter-spacing:1px;
  text-align:center;
}

.invite-card{
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 25px 60px rgba(0,0,0,0.18);
  background:white;
  padding:12px;
  transition:transform 0.2s ease;
}

.invite-card img{
  height:85vh;
  width:auto;
  max-width:90%;
  object-fit:contain;
  display:block;
  margin:auto;
}

.date{
  margin-top:20px;
  font-size:16px;
  color:#8c8c8c;
  letter-spacing:1px;
}

.countdown{
  margin-top:10px;
  font-size:15px;
  color:#a87c7c;
}

/* RIGHT SIDE */

.right{
  width:50%;
  background:#fbfbfb;
  border-left:1px solid #eee;
}

.right iframe{
  width:100%;
  height:100%;
  border:none;
}

/* mobile layout */

@media(max-width:900px){

.container{
  flex-direction:column;
}

.left{
  width:100%;
  padding:40px 20px;
}

.invite-card img{
  height:auto;
  width:100%;
  max-width:500px;
}

.title{
  font-size:48px;
}

.right{
  width:100%;
  height:75vh;
  border-left:none;
  border-top:1px solid #eee;
}

.rsvp-divider{
  text-align:center;
  margin:25px 0;
  font-size:18px;
  color:#888;
  letter-spacing:2px;
}

}

</style>
</head>
<body>

<script>

/* petals */

const colors=["#FFC0CB","#FFD700","#ADFF2F","#87CEFA","#FF69B4","#FFA07A","#DA70D6","#98FB98","#FFB6C1"];

const petalCount = window.innerWidth < 900 ? 40 : 80;

for(let i=0;i<petalCount;i++){

  const p=document.createElement("div");

  p.className="petal";

  p.style.left=Math.random()*100+"vw";
  p.style.width=6+Math.random()*12+"px";
  p.style.height=6+Math.random()*12+"px";

  p.style.background=colors[Math.floor(Math.random()*colors.length)];

  p.style.animationDuration=(6+Math.random()*8)+"s";
  p.style.animationDelay=Math.random()*5+"s";

  document.body.appendChild(p);
}

</script>

<div class="container">

<div class="left">

<div class="title">Erin & Matthew</div>
<div class="subtitle">We invite you to celebrate</div>

<div class="invite-card" id="inviteCard">
<img src="invite.jpg" alt="Wedding Invitation">
</div>

<p class="date">May 22, 2026 • Montreal</p>

<div class="countdown" id="countdown"></div>

<div class="rsvp-divider">RSVP BELOW</div>

</div>

<div class="right">

<iframe src="https://erin-and-matthew.anrsvp.com/?embed=true"></iframe>

</div>

</div>

<script>

/* countdown */

const weddingDate=new Date("May 22, 2026 16:00:00").getTime();

setInterval(function(){

const now=new Date().getTime();

const distance=weddingDate-now;

const days=Math.floor(distance/(1000*60*60*24));

document.getElementById("countdown").innerHTML=days+" days until we say 'I do'";

},1000);


/* tilt effect */

const card=document.getElementById("inviteCard");

card.addEventListener("mousemove",e=>{

const rect=card.getBoundingClientRect();

const x=e.clientX-rect.left;

const y=e.clientY-rect.top;

const centerX=rect.width/2;

const centerY=rect.height/2;

const rotateX=-(y-centerY)/20;

const rotateY=(x-centerX)/20;

card.style.transform=`rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

});

card.addEventListener("mouseleave",()=>{

card.style.transform="rotateX(0) rotateY(0)";

});

</script>

</body>
</html>
